<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Планирование работников</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .card { border-radius: 10px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
    #calendar { max-height: 500px; }
    .badge-work { background-color: #28a745; }
    .badge-sick { background-color: #dc3545; }
    .badge-vacation { background-color: #ffc107; }
  </style>
</head>
<body>
  <div class="container mt-4">
    <h1 class="text-center mb-4">📅 Планирование работников</h1>

    <!-- Форма добавления -->
    <div class="row mb-4">
      <div class="col-md-6 mx-auto">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Добавить запись</h5>
            <div class="mb-3">
              <label class="form-label">Имя и фамилия</label>
              <input type="text" class="form-control" id="workerName" placeholder="Иван Иванов" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Дата</label>
              <input type="date" class="form-control" id="workerDate" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Статус</label>
              <select class="form-select" id="workerStatus">
                <option value="Работает">✅ Работает</option>
                <option value="Болен">🤒 Болен</option>
                <option value="Отпуск">🏖 Отпуск</option>
              </select>
            </div>
            <button class="btn btn-primary me-2" onclick="addWorker()">Добавить</button>
            <button class="btn btn-success" onclick="saveToGitHub()">💾 Сохранить в GitHub</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Календарь -->
    <div class="row mb-4">
      <div class="col-md-10 mx-auto">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Календарь</h5>
            <div id="calendar"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Таблица записей -->
    <div class="row">
      <div class="col-md-10 mx-auto">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Список записей</h5>
            <div class="table-responsive">
              <table class="table table-striped">
                <thead>
                  <tr>
                    <th>Имя</th>
                    <th>Дата</th>
                    <th>Статус</th>
                    <th>Действия</th>
                  </tr>
                </thead>
                <tbody id="workersList"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Модальное окно для GitHub Token -->
    <div class="modal fade" id="tokenModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Введите GitHub Token</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <p>Вставьте ваш Personal Access Token (PAT) для сохранения данных:</p>
            <input type="password" class="form-control" id="githubToken">
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
            <button type="button" class="btn btn-primary" onclick="saveToken()">Сохранить токен</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
